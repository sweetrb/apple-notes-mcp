name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege: CI only needs to read the repo (checkout + pnpm). Publishing
# and code-scanning grant their own scoped tokens in their own workflows.
permissions:
  contents: read

jobs:
  test:
    runs-on: macos-latest

    strategy:
      fail-fast: false
      # pnpm 11.9 (packageManager) requires Node >= 22.13, so CI exercises the
      # dev toolchain on 22 (LTS) and 24 (current). The published server itself
      # still runs on Node >= 20 (engines.node) — pnpm is dev/CI-only.
      matrix:
        node-version: [22, 24]

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run linter
        run: pnpm run lint

      - name: Type check
        run: pnpm run typecheck

      - name: Run tests with coverage
        run: pnpm run test:coverage

      - name: Upload coverage reports
        if: matrix.node-version == 22
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false
        continue-on-error: true

      - name: Build
        run: pnpm run build

  # Integration suite (opt-in, real Notes.app). On CI the runner's Notes.app has
  # no signed-in account, so the live tests self-skip; the path-safety and
  # hashtag tests still run, proving the harness loads and the pure paths work.
  # Locally (with a populated library) the full live create/read/delete cycle runs.
  integration:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0

      - name: Setup Node.js 22
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run integration tests
        run: pnpm run test:integration
