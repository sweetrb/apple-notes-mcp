name: Publish to npm

on:
  release:
    types: [created]
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

# A release lands two pushes on main (PR merge + chore(release) bump), so two CI
# runs complete and each triggers a publish. Without serialization they race —
# both read the pre-publish version and the loser fails with a 403 "cannot
# publish over existing version". This group serializes them; the second then
# sees the version already published and skips cleanly.
concurrency:
  group: publish-to-npm
  cancel-in-progress: false

jobs:
  publish:
    runs-on: macos-latest
    if: >
      (github.event_name == 'release') ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push')
    permissions:
      id-token: write
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - name: Upgrade npm (OIDC trusted publishing needs npm >= 11.5.1)
        # Retry: the global install hits the live registry and has flaked on
        # transient ECONNRESET, aborting releases. Try up to 3 times.
        run: |
          for i in 1 2 3; do
            npm install -g npm@latest && exit 0
            echo "npm upgrade attempt $i failed; retrying in 5s…" >&2
            sleep 5
          done
          echo "::error::npm upgrade failed after 3 attempts" >&2
          exit 1

      - name: Check if version is already published
        id: check
        run: |
          LOCAL_VERSION=$(node -p "require('./package.json').version")
          PUBLISHED_VERSION=$(npm view apple-notes-mcp version 2>/dev/null || echo "0.0.0")
          echo "local=$LOCAL_VERSION" >> "$GITHUB_OUTPUT"
          echo "published=$PUBLISHED_VERSION" >> "$GITHUB_OUTPUT"
          if [ "$LOCAL_VERSION" = "$PUBLISHED_VERSION" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.check.outputs.skip == 'false'
        run: npm ci

      - name: Run linter
        if: steps.check.outputs.skip == 'false'
        run: npm run lint

      - name: Run tests
        if: steps.check.outputs.skip == 'false'
        run: npm test

      - name: Build
        if: steps.check.outputs.skip == 'false'
        run: npm run build

      - name: Publish to npm
        if: steps.check.outputs.skip == 'false'
        # Tolerate the publish race: a release pushes two commits, so two CI runs
        # complete and each triggers a publish. The concurrency group serializes
        # them, but npm's registry read (`npm view`, CDN-cached) lags the write,
        # so the second run's "already published?" check can still see the old
        # version, attempt `npm publish`, and get a 403 for the version the first
        # run just pushed. Treat that specific case as success.
        run: |
          if npm publish --provenance; then
            echo "Published."
          else
            LOCAL=$(node -p "require('./package.json').version")
            PUBLISHED=$(npm view apple-notes-mcp version 2>/dev/null || echo "")
            if [ "$PUBLISHED" = "$LOCAL" ]; then
              echo "Version $LOCAL is already on npm (published by a concurrent run); treating as success."
            else
              echo "::error::npm publish failed and $LOCAL is not on npm."
              exit 1
            fi
          fi

      - name: Create GitHub Release (keep Releases in sync with npm)
        if: steps.check.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if gh release view "v$VERSION" >/dev/null 2>&1; then
            echo "Release v$VERSION already exists; nothing to do."
          else
            NOTES=$(awk -v v="## [$VERSION]" 'index($0,v)==1{p=1;next} p&&/^## \[/{exit} p' CHANGELOG.md)
            [ -z "$NOTES" ] && NOTES="Published to npm as v$VERSION."
            gh release create "v$VERSION" --target "$(git rev-parse HEAD)" --title "v$VERSION" --notes "$NOTES" \
              || echo "::warning::Failed to create GitHub Release v$VERSION (npm publish still succeeded)"
          fi

      - name: Skip publish (version already published)
        if: steps.check.outputs.skip == 'true'
        run: echo "Version ${{ steps.check.outputs.local }} is already published. Skipping."
