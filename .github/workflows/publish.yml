name: Publish to npm

on:
  release:
    types: [created]
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

# A release lands two pushes on main (PR merge + chore(release) bump), so two CI
# runs complete and each triggers a publish. Without serialization they race —
# both read the pre-publish version and the loser fails with a 403 "cannot
# publish over existing version". This group serializes them; the second then
# sees the version already published and skips cleanly.
concurrency:
  group: publish-to-npm
  cancel-in-progress: false

jobs:
  publish:
    runs-on: macos-latest
    if: >
      (github.event_name == 'release') ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - name: Check if version is already published
        id: check
        run: |
          LOCAL_VERSION=$(node -p "require('./package.json').version")
          PUBLISHED_VERSION=$(npm view apple-notes-mcp version 2>/dev/null || echo "0.0.0")
          echo "local=$LOCAL_VERSION" >> "$GITHUB_OUTPUT"
          echo "published=$PUBLISHED_VERSION" >> "$GITHUB_OUTPUT"
          if [ "$LOCAL_VERSION" = "$PUBLISHED_VERSION" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.check.outputs.skip == 'false'
        run: npm ci

      - name: Run linter
        if: steps.check.outputs.skip == 'false'
        run: npm run lint

      - name: Run tests
        if: steps.check.outputs.skip == 'false'
        run: npm test

      - name: Build
        if: steps.check.outputs.skip == 'false'
        run: npm run build

      - name: Publish to npm
        if: steps.check.outputs.skip == 'false'
        # Tolerate the publish race: a release pushes two commits, so two CI runs
        # complete and each triggers a publish. The concurrency group serializes
        # them, but npm's registry read (`npm view`, CDN-cached) lags the write,
        # so the second run's "already published?" check can still see the old
        # version, attempt `npm publish`, and get a 403 for the version the first
        # run just pushed. Treat that specific case as success.
        run: |
          if npm publish; then
            echo "Published."
          else
            LOCAL=$(node -p "require('./package.json').version")
            PUBLISHED=$(npm view apple-notes-mcp version 2>/dev/null || echo "")
            if [ "$PUBLISHED" = "$LOCAL" ]; then
              echo "Version $LOCAL is already on npm (published by a concurrent run); treating as success."
            else
              echo "::error::npm publish failed and $LOCAL is not on npm."
              exit 1
            fi
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Skip publish (version already published)
        if: steps.check.outputs.skip == 'true'
        run: echo "Version ${{ steps.check.outputs.local }} is already published. Skipping."
