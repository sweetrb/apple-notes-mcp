# Single-package repo (no workspace packages). This file records pnpm's
# build-script approvals, which pnpm 11 reads only from here (the package.json
# "pnpm" field and .npmrc are no longer read, and the v10 onlyBuiltDependencies
# array was replaced by the allowBuilds map). esbuild — a transitive vite/vitest
# dev dependency — ships a postinstall; approving it keeps `pnpm install` from
# failing with ERR_PNPM_IGNORED_BUILDS.
allowBuilds:
  esbuild: true

# Pin pnpm 11's supply-chain minimum-release-age default explicitly (1440 min = 1 day)
# so it is documented and stable across pnpm upgrades. See https://pnpm.io/supply-chain-security.
minimumReleaseAge: 1440
